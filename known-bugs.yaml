# Known unsolved bugs tracked via Discord threads.
#
# Purpose: direct users to existing threads instead of creating duplicates.
# Escalate nodes in troubleshooting-tree.yaml can reference these by id
# to include a "join this thread" link instead of "create a new post".
#
# Fields:
#   id:              stable key, referenced from troubleshooting-tree.yaml
#   discord_thread:  thread ID in #more-help
#   github_issue:    optional, linked GH issue number
#   status:          open | investigating | fixed
#   affects:         list of troubleshooting-tree node ids that lead here
#   summary:         one-liner for LLM/human context during yaml editing

bugs:

  freeze_on_toggle:
    name: Screen freeze when toggling fullscreen/borderless or macros
    discord_thread: "1474141460424163348"
    github_issue: null
    status: investigating
    affects: [escalate_freeze, sol_ff_dedicated_amd, sol_ff_dedicated_nvidia]
    summary: >
      Screen goes black or freezes when toggling display modes or macros.
      Correlated with integrated GPUs, but also affects very new dGPUs
      (e.g. AMD RX 9070 XT) with immature driver support. Acknowledged by developer.

  flickering_fullscreen_borderless:
    name: Screen flickering in fullscreen/borderless
    discord_thread: "1474055729856905327"
    github_issue: null
    status: investigating
    affects: [escalate_freeze]
    summary: >
      Flickering when switching between fullscreen and borderless, or
      constantly while playing. Related to mirror rendering and display mode.

  rshift_rebind:
    name: RSHIFT / CAPSLOCK / RALT / LALT rebinding broken
    discord_thread: "1473758138107953265"
    github_issue: null
    status: fixed
    affects: [sol_kb_modifier_keys_legacy, sol_kb_modifier_keys_v11]
    summary: >
      Fixed in v1.1 (modifier keys) and v1.1.2 (left alt vs right alt).
      Keyboard layout editor in Advanced -> Inputs for advanced rebinding.

  first_boot_fail:
    name: Toolscreen fails on first launch after PC restart
    discord_thread: "1474839884542902403"
    github_issue: null
    status: open
    affects: [sol_nsu_first_boot_fail]
    summary: >
      TS works fine, then after a reboot it doesn't load until MC is
      relaunched 1-3 times. Intermittent, cause unknown.

  font_crash:
    name: Selecting a font crashes GUI / Ctrl+I shows cursor but no menu
    discord_thread: "1473697798821253150"
    github_issue: null
    status: investigating
    affects: [sol_kb_font_crash, sol_perf_font_reset]
    summary: >
      Changing fonts in settings corrupts textFontPath in config.toml.
      v1.0.9 added Arial fallback for invalid fonts but edge cases remain.
      Workaround: delete the textFontPath line from config.toml.

  global_frame_limit:
    name: Global frame limit is half of configured value (1.0.7+)
    discord_thread: "1474903666837159946"
    github_issue: null
    status: open
    affects: [escalate_generic]
    summary: >
      Frame limiter reports/applies half the configured FPS value.
      Reported since 1.0.7, persists in 1.0.9.1.

  cursor_size_not_saving:
    name: Cursor size resets after restart
    discord_thread: "1474623687553581126"
    github_issue: null
    status: open
    affects: [escalate_generic]
    summary: >
      Custom cursor size does not persist across restarts.

  themes_not_saving:
    name: Theme preset base not saving
    discord_thread: "1474041766217777162"
    github_issue: null
    status: open
    affects: [sol_save_themes]
    summary: >
      Custom colors save but the preset theme base resets. No workaround.

  resolution_not_saving:
    name: Thin/wide resolution not saving from Basic tab
    discord_thread: "1473226877442326578"
    github_issue: null
    status: open
    affects: [sol_save_resolution]
    summary: >
      Resolution set in Basic tab resets. Workaround: use Advanced tab.

  opengl_hook_conflict:
    name: OpenGL hook conflict prevents initialization
    discord_thread: "1472915912020594865"
    github_issue: null
    status: investigating
    affects: [sol_disable_gpu_overlay]
    summary: >
      Toolscreen fails to hook OpenGL on certain system configurations.
      Related to AMD Adrenalin / hook chaining.

  obs_only_dependency:
    name: Toolscreen only works when OBS is open
    discord_thread: "1473957957094998141"
    github_issue: null
    status: investigating
    affects: [sol_kb_ctrli_obs]
    summary: >
      Two causes: AMD Adrenalin DLL injection, or hook chaining issue.
      v1.1 enabled hook chaining by default. Try changing hookChainingTarget
      between Original and Latest in config.toml. Virtual Camera as last resort.

  phantom_right_click:
    name: Random phantom right-clicks in v1.0.9.1
    discord_thread: null
    github_issue: null
    status: open
    affects: []
    summary: >
      v1.0.9.1 causes random right-clicks (e.g. misplacing obsidian).
      Workaround: delete config.toml + reinstall. No longer surfaced in
      troubleshooting tree (removed as unreliable/outdated guidance).

  eyezoom_esc_opacity:
    name: Eye zoom overlay goes transparent when pausing with Esc
    discord_thread: null
    github_issue: null
    status: fixed
    affects: [sol_sens_eyezoom_esc_opacity]
    summary: >
      Fixed in v1.1 ("EyeZoom rendering issues with fog / pause menu").
      Workaround for older versions: use F3+Esc instead of plain Esc.

  ninb_overlay_mouse_capture:
    name: NinB window overlay captures mouse / causes tab-out
    discord_thread: null
    github_issue: null
    status: open
    affects: [sol_ninb_setup_window]
    summary: >
      Hovering over NinB's background position causes game pauses/tab-outs.
      Fear acknowledged overlays are "a little cooked."

  eyezoom_white_overlay:
    name: EyeZoom clone projector renders all-white / mirrors disappear
    discord_thread: null
    github_issue: null
    status: fixed
    affects: [eyezoom_white_version, sol_eyezoom_white_1112, sol_eyezoom_white_113, sol_eyezoom_white_114plus]
    summary: >
      Introduced in v1.1.1. Toolscreen calibrates the wrong OpenGL texture
      (id 3 instead of 60) when OBS, Medal, or RTSS hooks in first.
      Partially fixed in v1.1.3; fully fixed in v1.1.4.
      Medal masquerades as OBS hook (medal-hook64.dll) which triggered the bug.

  camera_snap_raw_input_off:
    name: Camera snaps to floor / spins when entering EyeZoom with raw input off
    discord_thread: null
    github_issue: null
    status: fixed
    affects: [sol_sens_camera_snap]
    summary: >
      Regression in v1.1.1. Mouse delta handling broke when rawInput=false,
      causing violent camera movement on any mode switch. Fixed in v1.1.3.
      Mitigation: always keep raw input ON; use EyeZoom sensitivity override instead.

  alt_mode_hotkey_priority:
    name: Shift+key alternative mode fires on base key press (evaluation order inverted)
    discord_thread: null
    github_issue: null
    status: open
    affects: [sol_mode_alt_hotkey_priority]
    summary: >
      When a hotkey has a Shift+key alternative mode, pressing the base key
      alone also triggers the alternative mode swap first. Under investigation by jojoe.

  pixel_skipping_multiplier:
    name: Pixel skipping unusually large at specific global multiplier values
    discord_thread: null
    github_issue: null
    status: open
    affects: [sol_sens_pixel_skipping]
    summary: >
      At certain multiplier values (e.g. 1.35x) mouse ticks skip 4-8 pixels
      instead of ~1-2. Suspected float accumulation bug. Workaround: adjust
      multiplier slightly (e.g. 1.35 -> 1.351).

  sens_resets_via_standardsettings:
    name: In-game sensitivity overwritten by StandardSettings on world load
    discord_thread: null
    github_issue: null
    status: open
    affects: [sol_sens_resets_world]
    summary: >
      mouseSensitivity in standardsettings.json overwrites options.txt on each
      world load. Both files must be set to the same value. Not a Toolscreen bug
      per se, but a frequent source of confusion.
